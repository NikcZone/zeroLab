<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Global Mood AI FULL</title>

<style>
body { background:#0f172a; color:white; font-family:Arial; padding:20px; }
.container { max-width:900px; margin:auto; }
.slider { margin-bottom:10px; }
input { width:100%; }

#result {
    margin-top:20px;
    padding:15px;
    border-radius:10px;
    font-size:22px;
    text-align:center;
}

canvas {
    background:#020617;
    margin-top:20px;
    border-radius:10px;
}

.box {
    margin-top:10px;
    padding:10px;
    background:#1e293b;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h1>🌍 Global Mood AI FULL</h1>

<button onclick="loadScenario('current')">Attuale</button>
<button onclick="loadScenario('green')">Green</button>
<button onclick="loadScenario('crisis')">Crisi</button>

<hr>

<div class="slider">CO2 <span id="co2_val"></span>
<input id="co2" type="range" min="350" max="600"></div>

<div class="slider">Temperatura <span id="temp_val"></span>
<input id="temp" type="range" min="0.5" max="3" step="0.1"></div>

<div class="slider">Eventi estremi <span id="events_val"></span>
<input id="events" type="range" min="0" max="100"></div>

<div class="slider">Fossili <span id="fossil_val"></span>
<input id="fossil" type="range" min="0" max="100"></div>

<div class="slider">Prezzo cibo <span id="food_val"></span>
<input id="food" type="range" min="80" max="200"></div>

<div class="slider">Conflitti <span id="conflict_val"></span>
<input id="conflict" type="range" min="0" max="100"></div>

<div class="slider">Disuguaglianza <span id="ineq_val"></span>
<input id="ineq" type="range" min="0.2" max="0.7" step="0.01"></div>

<button onclick="simulate()">Simula 20 anni</button>

<div id="result"></div>

<div class="box" id="analysis"></div>

<div class="box">
<b>Legenda:</b><br>
<span style="color:lime;">■ Mood</span> |
<span style="color:red;">■ Clima</span> |
<span style="color:orange;">■ Conflitti</span>
</div>

<canvas id="chart" width="800" height="300"></canvas>

</div>

<script>

// ===== MODEL =====
let model = null;

// ===== LOAD MODEL =====
async function loadModel(){
    try {
        let res = await fetch("model.json");
        model = await res.json();
    } catch(e) {
        console.log("fallback attivo");
    }
}

// ===== ACTIVATION =====
function relu(x){ return Math.max(0,x); }

// ===== AI MODEL =====
function runModel(input){

    if(!model) return fallbackModel(input);

    let [w1,b1,w2,b2] = model;

    function layer(x,w,b,act=true){
        let out=[];
        for(let i=0;i<w.length;i++){
            let sum=b[i];
            for(let j=0;j<x.length;j++){
                sum += x[j]*w[i][j];
            }
            out.push(act ? relu(sum) : sum);
        }
        return out;
    }

    let l1 = layer(input,w1,b1);
    let out = layer(l1,w2,b2,false);

    return out[0];
}

// ===== FALLBACK MODEL =====
function fallbackModel([co2,temp,events,fossil,food,conflict,ineq]){

    let climate = temp*40 + (co2-400)*0.1;
    let stress = conflict*1.2 + events*0.8 + (food-100)*0.5;
    let system = fossil*0.5 + ineq*100;

    let mood = 100 - (climate*0.3 + stress*0.3 + system*0.2);

    return mood;
}

// ===== UPDATE UI =====
function updateUI(){

    let data = getData();

    let mood = runModel([
        data.co2,data.temp,data.events,
        data.fossil,data.food,data.conflict,data.ineq
    ]);

    mood = 100-= Math.max(0, Math.min(100, mood));

    let color = "green";
    if(mood < 40) color = "red";
    else if(mood < 70) color = "orange";

    result.style.background = color;
    result.innerText = "Mood: " + mood.toFixed(1);

    updateLabels();
}

// ===== DATA =====
function getData(){
    return {
        co2:+co2.value,
        temp:+temp.value,
        events:+events.value,
        fossil:+fossil.value,
        food:+food.value,
        conflict:+conflict.value,
        ineq:+ineq.value
    };
}

// ===== LABELS =====
function updateLabels(){
    co2_val.innerText = co2.value;
    temp_val.innerText = temp.value;
    events_val.innerText = events.value;
    fossil_val.innerText = fossil.value;
    food_val.innerText = food.value;
    conflict_val.innerText = conflict.value;
    ineq_val.innerText = ineq.value;
}

// ===== SIMULATION =====
let history = { mood:[], climate:[], conflict:[] };

function simulate(){

    let d = getData();
    history = { mood:[], climate:[], conflict:[] };

    for(let i=0;i<20;i++){

        d.co2 += d.fossil*0.2;
        d.temp += d.co2*0.0003;
        d.events += d.temp*1.5;
        d.food += d.events*0.2;
        d.conflict += (d.food/150) + d.ineq*2;

        let mood = runModel([
            d.co2,d.temp,d.events,d.fossil,d.food,d.conflict,d.ineq
        ]);

        history.mood.push(mood);
        history.climate.push(d.temp*40);
        history.conflict.push(d.conflict);
    }

    drawChart();
    analyze();
}

// ===== CHART =====
function drawChart(){

    let ctx = chart.getContext("2d");
    ctx.clearRect(0,0,800,300);

    function draw(data,scale,color){
        ctx.beginPath();
        ctx.moveTo(0,300-data[0]*scale);
        for(let i=1;i<data.length;i++){
            ctx.lineTo(i*40,300-data[i]*scale);
        }
        ctx.strokeStyle=color;
        ctx.stroke();
    }

    draw(history.mood,3,"lime");
    draw(history.climate,1,"red");
    draw(history.conflict,2,"orange");

    ctx.fillStyle="lime"; ctx.fillText("Mood",10,20);
    ctx.fillStyle="red"; ctx.fillText("Clima",10,40);
    ctx.fillStyle="orange"; ctx.fillText("Conflitti",10,60);
}

// ===== ANALYSIS =====
function analyze(){

    let txt = "<b>Analisi:</b><br>";

    if(history.mood[19] < history.mood[0])
        txt += "🔻 Peggioramento<br>";
    else
        txt += "🟢 Miglioramento<br>";

    if(history.climate[19] > 80)
        txt += "🔥 Stress climatico alto<br>";

    if(history.conflict[19] > 70)
        txt += "⚔️ Conflitti elevati<br>";

    analysis.innerHTML = txt;
}

// ===== SCENARI =====
function loadScenario(type){

    if(type==="current"){
        co2.value=420; temp.value=1.2; events.value=50;
        fossil.value=65; food.value=120; conflict.value=40; ineq.value=0.4;
    }

    if(type==="green"){
        co2.value=380; temp.value=1.0; events.value=40;
        fossil.value=30; food.value=100; conflict.value=20; ineq.value=0.3;
    }

    if(type==="crisis"){
        co2.value=500; temp.value=2.2; events.value=80;
        fossil.value=85; food.value=160; conflict.value=70; ineq.value=0.6;
    }

    updateUI();
}

// ===== INIT =====
window.onload = async () => {

    await loadModel();

    document.querySelectorAll("input").forEach(el=>{
        el.addEventListener("input", updateUI);
    });

    loadScenario("current");
};

</script>

</body>
</html>
